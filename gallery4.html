    <style>
      /* Main navigation and gallery buttons styling */
      .gallery-buttons {
        display: flex;
        justify-content: center;
        gap: 70px;
        margin: 40px 0;
      }

      .image-button {
        text-align: center;
        position: relative;
      }

      .image-label-wrapper {
        position: relative;
        display: inline-block;
      }

      .image-label-wrapper img {
        display: block;
        width: 170px;
        height: auto;
        object-fit: contain;
      }

      .label {
        position: absolute;
        top: 100px;
        left: 50%;
        transform: translateX(-50%);
        background-color: rgba(255, 255, 255, 0.8);
        color: #333;
        font-size: 14px;
        padding: 2px 6px;
        border-radius: 4px;
        pointer-events: none;
      }

      /* Gallery grid styling */
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
        margin: 40px 0;
      }

      .gallery-item {
        position: relative;
      }

      .gallery-item img {
        width: 100%;
        height: auto;
        object-fit: cover;
        cursor: pointer;
        transition: transform 0.3s ease;
      }

      .gallery-item img:hover {
        transform: scale(1.03);
      }

      .gallery-item p {
        margin-top: 8px;
        font-size: 14px;
        color: #555;
      }

      /* Modal styling */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.9);
      }

      .modal-content {
        margin: auto;
        display: block;
        max-width: 80%;
        max-height: 80vh;
        position: relative;
        top: 50%;
        transform: translateY(-50%);
      }

      .caption {
        margin: auto;
        display: block;
        width: 80%;
        text-align: center;
        color: white;
        padding: 10px 0;
        height: 40px;
      }

      /* Close button */
      .close {
        position: absolute;
        top: 15px;
        right: 35px;
        color: #f1f1f1;
        font-size: 40px;
        font-weight: bold;
        transition: 0.3s;
        cursor: pointer;
      }

      .close:hover,
      .close:focus {
        color: #bbb;
        text-decoration: none;
      }
    </style>
  </head>
